<div class="bg-light">
  <div class="form-wrapper">
    <div class="form-card">
      
      <div class="form-header">
        <h2>Cadastrar Novo Paciente</h2>
        <p>Preencha os dados abaixo para abrir o prontuário do paciente.</p>
      </div>

      <form (ngSubmit)="salvar()">
        <div class="form-grid">
          
          <div class="input-group full-width">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" [(ngModel)]="paciente.nome" placeholder="Ex: Maria Oliveira" required>
          </div>

          <div class="input-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" [(ngModel)]="paciente.cpf" placeholder="000.000.000-00" required>
          </div>

          <div class="input-group">
            <label for="dataNascimento">Data de Nascimento</label>
            <input type="date" id="dataNascimento" name="dataNascimento" [(ngModel)]="paciente.dataNascimento" required>
          </div>

          <div class="input-group">
            <label for="telefone">Telefone / WhatsApp</label>
            <input type="text" id="telefone" name="telefone" [(ngModel)]="paciente.telefone" placeholder="(00) 00000-0000" required>
          </div>

          <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" [(ngModel)]="paciente.email" placeholder="maria@email.com">
          </div>

        </div>

        <div class="form-actions">
          <button type="button" class="btn-next" style="background-color: #ef4444;" routerLink="/inicio">Cancelar</button>
          <button type="submit" class="btn-next">Salvar Paciente</button>
        </div>
      </form>

    </div>
  </div>
</div>
