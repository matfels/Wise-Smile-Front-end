<div class="container-page">
  <div class="header-title">
    

  <div class="card-form">
        <div class="form-header">
            <h2>Cadastrar Novo Paciente</h2>
        
      </div>
    <form (ngSubmit)="salvar()">
      
      <div class="form-group">
        <label for="nome">NOME COMPLETO</label>
        <input type="text" id="nome" name="nome" [(ngModel)]="usuario.nome" required placeholder="Digite o nome completo">
      </div>

      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" [(ngModel)]="usuario.cpf" required placeholder="000.000.000-00">
      </div>

      <div class="form-group">
        <label for="email">E-MAIL (LOGIN)</label>
        <input type="email" id="email" name="email" [(ngModel)]="usuario.email" required placeholder="usuario@clinica.com.br">
      </div>

      <div class="form-group">
        <label for="senha">SENHA DE ACESSO</label>
        <input type="password" id="senha" name="senha" [(ngModel)]="usuario.senha" required placeholder="Crie uma senha forte">
      </div>

      <div class="form-group">
        <label for="perfil">PERFIL DE ACESSO</label>
        <select id="perfil" name="perfil" [(ngModel)]="usuario.perfil" required>
          <option value="Comum">Comum</option>
          <option value="Admin">Administrador</option>
          <option value="Dentista">Dentista</option>    
        </select>
      </div>

      <div class="actions">
        <button type="button" class="btn-next" style="background-color: #ef4444;" routerLink="/inicio">Cancelar</button>
        <button type="submit" class="btn-next">Salvar Cadastro</button>
      </div>

    </form>
  </div>
</div>
