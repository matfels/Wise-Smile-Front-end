<div class="login-wrapper">
    <div class="login-card">
        
        <div class="logo" style="justify-content: center; margin-bottom: 0.5rem;">

            <span class="text-color" style="font-size: 1.75rem;" >Wise Smile</span>
        </div>
        <p class="login-subtitle">Acesse sua conta</p>
        
        <form>
            <div class="input-group">
                <input type="text" placeholder="Usuário" required>
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Senha" required>
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </div>

            <button type="submit" class="button" class="btn-next">Entrar</button>
        </form>

        <div class="login-footer">
            Esqueceu a Senha? <a href="#">Clique Aqui</a>
        </div>
    </div>
</div>
