<div class="bg-light">
  <div class="form-wrapper">
    <div class="form-card">

      <div class="form-header">
        <h2>Registrar Novo Dentista</h2>
        <p>Preencha os dados abaixo para adicionar um profissional à clínica.</p>
      </div>

      <form (ngSubmit)="salvar()">
        <div class="form-grid">

          <div class="input-group full-width">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" [(ngModel)]="dentista.nome"
              placeholder="Ex: Dr. João Pedro da Silva" required>
          </div>

          <div class="input-group full-width">
            <label for="email">E-mail Profissional</label>
            <input type="email" id="email" name="email" [(ngModel)]="dentista.email"
              placeholder="joao.pedro@wisesmile.com" required>
          </div>

          <div class="input-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" [(ngModel)]="dentista.cpf" placeholder="000.000.000-00" required>
          </div>

          <div class="input-group">
            <label for="cro">CRO</label>
            <input type="text" id="cro" name="cro" [(ngModel)]="dentista.cro" placeholder="PR-12345" required>
          </div>

          <div class="input-group full-width">
            <label>ESPECIALIDADES DO DENTISTA(Selecione uma ou mais)</label>
            <div class="checkbox-grid">
              @for (esp of listaEspecialidades; track esp.id) {
              <div class="checkbox-item" style="display: flex; align-items: center; gap: 5px;">

                <input type="checkbox" [id]="'esp-' + esp.id" (change)="toggleEspecialidade(esp, $event)"
                  [checked]="isEspecialidadeSelecionada(esp.id)" style="width: 18px; height: 18px; cursor: pointer;">

                <label [for]="'esp-' + esp.id"
                  style="margin-bottom: 0; text-transform: none; font-weight: 500; cursor: pointer;">
                  {{ esp.nome }}
                </label>

              </div>
              }



            </div>
          </div>

        </div>

        <div class="form-actions">

          <button type="button" class="btn-next" style="background-color: #ef4444;"
            routerLink="/inicio">Cancelar</button>
          <button type="submit" class="btn-next">Salvar Cadastro</button>
        </div>
      </form>

    </div>
  </div>
</div>
