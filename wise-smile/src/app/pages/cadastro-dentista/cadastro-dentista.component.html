<div class="bg-light">
  <div class="form-wrapper">
    <div class="form-card">
      
      <div class="form-header">
        <h2>Registrar Novo Dentista</h2>
        <p>Preencha os dados abaixo para adicionar um profissional à clínica.</p>
      </div>

      <form>
        <div class="form-grid">
          
          <div class="input-group full-width">
            <label for="nome">Nome Completo</label>
            <input 
              type="text" 
              id="nome" 
              name="nome"
              placeholder="Ex: Dr. João Pedro da Silva" 
              required
            >
          </div>

          <div class="input-group full-width">
            <label for="email">E-mail Profissional</label>
            <input 
              type="email" 
              id="email" 
              name="email"
              placeholder="joao.pedro@wisesmile.com" 
              required
            >
          </div>

          <div class="input-group">
            <label for="cpf">CPF</label>
            <input 
              type="text" 
              id="cpf" 
              name="cpf"
              placeholder="000.000.000-00" 
              required
            >
          </div>

          <div class="input-group">
            <label for="cro">CRO</label>
            <input 
              type="text" 
              id="cro" 
              name="cro"
              placeholder="PR-12345" 
              required
            >
          </div>

          <div class="input-group full-width">
            <label>Especialidades (Selecione uma ou mais)</label>
            <div class="checkbox-grid">
              
              <label class="checkbox-card">
                <input type="checkbox" name="especialidade" value="1">
                <span class="checkbox-content">Ortodontia</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" name="especialidade" value="2">
                <span class="checkbox-content">Implantodontia</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" name="especialidade" value="3">
                <span class="checkbox-content">Endodontia</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" name="especialidade" value="4">
                <span class="checkbox-content">Odontopediatria</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" name="especialidade" value="5">
                <span class="checkbox-content">Clínica Geral</span>
              </label>

            </div>
          </div>

        </div>

        <div class="form-actions">
          <button type="button" class="btn-next">Cancelar</button>
          <button type="submit" class="btn-next">Salvar Cadastro</button>
        </div>
      </form>

    </div>
  </div>
</div>
