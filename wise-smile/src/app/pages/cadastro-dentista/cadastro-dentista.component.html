<div class="bg-light">
  <div class="form-wrapper">
    <div class="form-card">
      
      <div class="form-header">
        <h2>Registrar Novo Dentista</h2>
        <p>Preencha os dados abaixo para adicionar um profissional à clínica.</p>
      </div>

      <form (ngSubmit)="salvar()">
        <div class="form-grid">
          
          <div class="input-group full-width">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" [(ngModel)]="dentista.nome" placeholder="Ex: Dr. João Pedro da Silva" required>
          </div>

          <div class="input-group full-width">
            <label for="email">E-mail Profissional</label>
            <input type="email" id="email" name="email" [(ngModel)]="dentista.email" placeholder="joao.pedro@wisesmile.com" required>
          </div>

          <div class="input-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" [(ngModel)]="dentista.cpf" placeholder="000.000.000-00" required>
          </div>

          <div class="input-group">
            <label for="cro">CRO</label>
            <input type="text" id="cro" name="cro" [(ngModel)]="dentista.cro" placeholder="PR-12345" required>
          </div>

          <div class="input-group full-width">
            <label>Especialidades (Selecione uma ou mais)</label>
            <div class="checkbox-grid">
              
              <label class="checkbox-card">
                <input type="checkbox" name="especialidade1" value="1" (change)="toggleEspecialidade(1, $event)">
                <span class="checkbox-content">Ortodontia</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" name="especialidade2" value="2" (change)="toggleEspecialidade(2, $event)">
                <span class="checkbox-content">Implantodontia</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" name="especialidade3" value="3" (change)="toggleEspecialidade(3, $event)">
                <span class="checkbox-content">Endodontia</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" name="especialidade4" value="4" (change)="toggleEspecialidade(4, $event)">
                <span class="checkbox-content">Odontopediatria</span>
              </label>

              <label class="checkbox-card">
                <input type="checkbox" name="especialidade5" value="5" (change)="toggleEspecialidade(5, $event)">
                <span class="checkbox-content">Clínica Geral</span>
              </label>

            </div>
          </div>

        </div>

        <div class="form-actions">
          <button type="button" class="btn-next" style="background-color: #ef4444;" routerLink="/inicio">Cancelar</button>
          <button type="submit" class="btn-next">Salvar Cadastro</button>
        </div>
      </form>

    </div>
  </div>
</div>
